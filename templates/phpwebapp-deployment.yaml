apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp-app
  template:
    metadata:
      labels:
        app: webapp-app
    spec:
      containers:
        - name: webapp
          image: ghcr.io/izual750/bso-training-webapp:1.2.2
          ports:
            - containerPort: 8080