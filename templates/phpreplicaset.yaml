apiVersion: v1
kind: ReplicaSet
metadata:
  name: bso-trianing-webapp-rs
  labels:
    app: php
    tier: webapp
spec:
  # modify replicas according to your case
  replicas: 1
  selector:
    matchLabels:
      tier: webapp
  template:
    metadata:
      labels:
        tier: webapp
    spec:
      containers:
      - name: bso-training-webapp
        image: ghcr.io/izual750/bso-training-webapp:latest
        ports:
          containerPort: 9000
          protocol: TCP
