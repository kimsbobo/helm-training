apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-nginx-config-cm
data:
  my-site.conf: |
    server {
        listen 80;
        server_name ara-webapp.bso.cloud;

        location = / {
            fastcgi_pass webapp-service:9000;
            fastcgi_index main.php;
            fastcgi_param SCRIPT_FILENAME $document_root/main.php;
            include fastcgi_params;
        }

        location ~ \.php$ {
            fastcgi_pass webapp-service:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ \.(css|js)$ {
            try_files $uri =404;
        }

        location ~ /\.ht {
            deny all;
        }
    }
