apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-nginx-config-cm
data:
  my-site.conf: |
    server {
        listen 80;
        server_name ara-webapp.bso.cloud; # Replace with your domain or IP

        location / {
            # The internal address of your new service
            proxy_pass http://127.0.0.1:3000; 

            # Standard headers to ensure the backend knows the real client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Optional: Handle WebSockets if your service needs them
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }