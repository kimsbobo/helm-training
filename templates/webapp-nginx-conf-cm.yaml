apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-nginx-config-cm
data:
  my-site.conf: |
    server {
        listen 80;

        root /var/www/html;
        index main.php;

        location / {
            try_files $uri $uri/ /main.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass webapp-service:9000;
            fastcgi_index main.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
