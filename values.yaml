# Default values for simple-webapp

replicaCount: 2

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# ✅ MULTI-CONTAINER DEFINITION
containers:
  - name: nginx
    image: nginx:latest
    imagePullPolicy: IfNotPresent
    ports:
      - name: http
        containerPort: 80
    volumeMounts:
      - name: nginx-config-vm
        mountPath: /etc/nginx/conf.d
      - name: simpleweb-app-html-vm
        mountPath: /usr/share/nginx/html
    livenessProbe:
      httpGet:
        path: /
        port: http
    readinessProbe:
      httpGet:
        path: /
        port: http

  - name: webapp-php
    image: ghcr.io/izual750/bso-training-webapp:1.2
    imagePullPolicy: IfNotPresent
    ports:
      - name: webapp-port
        containerPort: 8080

# Service config (points to nginx)
service:
  type: ClusterIP
  port: 80

# ✅ FIXED INGRESS
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-production
  hosts:
    - host: ara-webapp.bso.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: simple-webapp-tls
      hosts:
        - ara-webapp.bso.cloud
  ingressIP: 89.30.39.130

# Optional HTTPRoute (unchanged)
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers

# Resources (optional)
resources: {}

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# ✅ VOLUMES (shared across containers)
volumes:
  - name: nginx-config-vm
    configMap:
      name: webapp-nginx-config-cm
  - name: simpleweb-app-html-vm
    configMap:
      name: simplewebapp-html-cm

nodeSelector: {}
tolerations: []
affinity: {}
